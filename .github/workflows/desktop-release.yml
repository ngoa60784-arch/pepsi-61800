name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

jobs:
  linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev librsvg2-dev pkg-config
      - run: bash scripts/pack-desktop.sh
      - uses: actions/upload-artifact@v4
        with:
          name: breachweave-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm

  windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun run scripts/prepare-desktop-sidecar.ts --platform=windows
      - run: cd apps/desktop && bun install --ignore-scripts
      - run: cd apps/desktop && bun run tauri build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: breachweave-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe

  macos:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun run scripts/prepare-desktop-sidecar.ts --platform=macos-arm64
      - run: cd apps/desktop && bun install --ignore-scripts
      - run: cd apps/desktop && bun run tauri build --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: breachweave-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
